name: Rolling Release

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # Daily: update flake.lock then rebuild
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-lock:
    runs-on: ubuntu-latest
    # Skip on normal pushes — those already have a lockfile; still succeed so builds can need this job.
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        if: github.event_name != 'push'
        uses: cachix/install-nix-action@v30
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Update flake.lock and push
        if: github.event_name != 'push'
        run: |
          nix flake update
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add flake.lock
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update flake.lock"
            git push
          fi

  build-linux-macos:
    needs: [update-lock]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: omnimux-linux
          - os: macos-latest
            artifact_name: omnimux-macos
    runs-on: ${{ matrix.os }}
    steps:
      # After schedule/dispatch lock updates, use branch tip (not the pre-push SHA).
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.sha || 'main' }}

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build with Nix
        run: nix build .#omnimux --impure

      - name: Install fpm & AppImageTool (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm libarchive-tools
          sudo gem install fpm
          wget -O appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

      - name: Package for Linux (deb, rpm, pacman, AppImage)
        if: runner.os == 'Linux'
        run: |
          # Current GPUI package layout: $out/bin/omnimux + $out/share/...
          mkdir -p dist/usr/bin dist/usr/share
          cp -L result/bin/omnimux dist/usr/bin/omnimux
          chmod +x dist/usr/bin/omnimux
          cp -a result/share/. dist/usr/share/
          chmod -R u+w dist/usr/share

          # Package using fpm
          fpm -s dir -t deb -n omnimux -v 0.1.0 -C dist .
          fpm -s dir -t rpm -n omnimux -v 0.1.0 -C dist .
          fpm -s dir -t pacman -n omnimux -v 0.1.0 -C dist .

          # Package AppImage
          mkdir -p AppDir/usr/bin AppDir/usr/share
          cp -L result/bin/omnimux AppDir/usr/bin/omnimux
          chmod +x AppDir/usr/bin/omnimux
          cp -a result/share/. AppDir/usr/share/
          chmod -R u+w AppDir/usr/share
          cp result/share/icons/hicolor/scalable/apps/omnimux.svg AppDir/omnimux.svg
          cp result/share/applications/omnimux.desktop AppDir/omnimux.desktop
          # AppImage desktop entry expects Icon=omnimux
          sed -i 's|^Exec=.*|Exec=omnimux|' AppDir/omnimux.desktop
          cat << 'EOF' > AppDir/AppRun
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "${0}")")"
          export OMNIMUX_FONTS_DIR="${HERE}/usr/share/omnimux/fonts"
          exec "${HERE}/usr/bin/omnimux" "$@"
          EOF
          chmod +x AppDir/AppRun
          # appimagetool is itself an AppImage; GHA runners have no FUSE/libfuse2.
          # ARCH is required when AppDir has no usr/lib (binary-only layout).
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool AppDir omnimux-x86_64.AppImage

      - name: Package for macOS (dmg)
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname Omnimux -srcfolder result/Applications/Omnimux.app -ov -format UDZO omnimux-macos.dmg

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            *.deb
            *.rpm
            *.pkg.tar.zst
            *.AppImage
            *.dmg
          if-no-files-found: error

  # Windows: omnimux is GPUI/Rust via Nix (platforms.unix). The old Flutter
  # windows job was removed after the rewrite — no pubspec.yaml / Flutter UI.

  release:
    needs: [build-linux-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update Rolling Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rolling
          name: Rolling Release
          prerelease: true
          make_latest: true
          files: artifacts/*
