name: Rolling Release

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # Daily: update flake.lock then rebuild
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-lock:
    runs-on: ubuntu-latest
    # Skip on normal pushes — those already have a lockfile; still succeed so builds can need this job.
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        if: github.event_name != 'push'
        uses: cachix/install-nix-action@v30
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Update flake.lock and push
        if: github.event_name != 'push'
        run: |
          nix flake update
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add flake.lock
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update flake.lock"
            git push
          fi

  build-linux-macos:
    needs: [update-lock]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: omnimux-linux-x86_64
            appimage_arch: x86_64
            appimagetool: appimagetool-x86_64.AppImage
            appimagetool_arch: x86_64
          - os: ubuntu-24.04-arm
            artifact_name: omnimux-linux-aarch64
            appimage_arch: aarch64
            appimagetool: appimagetool-aarch64.AppImage
            # Legacy AppImageKit only accepts arm_aarch64; maintained appimagetool uses aarch64.
            appimagetool_arch: aarch64
          - os: macos-latest
            artifact_name: omnimux-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      # After schedule/dispatch lock updates, use branch tip (not the pre-push SHA).
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.sha || 'main' }}

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build with Nix
        run: nix build .#omnimux --impure

      - name: Install fpm & AppImageTool (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm libarchive-tools
          sudo gem install fpm
          wget -O appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/${{ matrix.appimagetool }}"
          chmod +x appimagetool

      - name: Package for Linux (deb, rpm, pacman, AppImage)
        if: runner.os == 'Linux'
        env:
          APPIMAGE_ARCH: ${{ matrix.appimagetool_arch }}
        run: |
          # Current GPUI package layout: $out/bin/omnimux + $out/share/...
          mkdir -p dist/usr/bin dist/usr/share
          cp -L result/bin/omnimux dist/usr/bin/omnimux
          chmod +x dist/usr/bin/omnimux
          cp -a result/share/. dist/usr/share/
          chmod -R u+w dist/usr/share

          # Package using fpm
          fpm -s dir -t deb -n omnimux -v 0.1.0 -C dist .
          fpm -s dir -t rpm -n omnimux -v 0.1.0 -C dist .
          fpm -s dir -t pacman -n omnimux -v 0.1.0 -C dist .

          # Package AppImage
          mkdir -p AppDir/usr/bin AppDir/usr/share
          cp -L result/bin/omnimux AppDir/usr/bin/omnimux
          chmod +x AppDir/usr/bin/omnimux
          cp -a result/share/. AppDir/usr/share/
          chmod -R u+w AppDir/usr/share
          cp result/share/icons/hicolor/scalable/apps/omnimux.svg AppDir/omnimux.svg
          cp result/share/applications/omnimux.desktop AppDir/omnimux.desktop
          # AppImage desktop entry expects Icon=omnimux
          sed -i 's|^Exec=.*|Exec=omnimux|' AppDir/omnimux.desktop
          cat << 'EOF' > AppDir/AppRun
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "${0}")")"
          export OMNIMUX_FONTS_DIR="${HERE}/usr/share/omnimux/fonts"
          exec "${HERE}/usr/bin/omnimux" "$@"
          EOF
          chmod +x AppDir/AppRun
          # appimagetool is itself an AppImage; GHA runners have no FUSE/libfuse2.
          # ARCH is required when AppDir has no usr/lib (binary-only layout).
          ARCH="$APPIMAGE_ARCH" APPIMAGE_EXTRACT_AND_RUN=1 \
            ./appimagetool AppDir "omnimux-${APPIMAGE_ARCH}.AppImage"

      - name: Package for macOS (dmg)
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname Omnimux -srcfolder result/Applications/Omnimux.app -ov -format UDZO omnimux-macos-aarch64.dmg

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            *.deb
            *.rpm
            *.pkg.tar.zst
            *.AppImage
            *.dmg
          if-no-files-found: error

  build-windows:
    needs: [update-lock]
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x86_64
            artifact_name: omnimux-windows-x86_64
          - os: windows-11-arm
            arch: aarch64
            artifact_name: omnimux-windows-aarch64
    runs-on: ${{ matrix.os }}
    env:
      # GPUI / proc-macro expansion can overflow the default stack on Windows CI.
      RUST_MIN_STACK: 536870912
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.sha || 'main' }}

      - name: Resolve nurpkgs revision
        id: nurpkgs
        shell: pwsh
        run: |
          $lock = Get-Content flake.lock -Raw | ConvertFrom-Json
          $rev = $lock.nodes.nurpkgs.locked.rev
          "rev=$rev" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - uses: actions/checkout@v4
        with:
          repository: mio-19/nurpkgs
          ref: ${{ steps.nurpkgs.outputs.rev }}
          path: nurpkgs
          sparse-checkout: |
            by-name/om/omnimux

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: nurpkgs/by-name/om/omnimux/src
          key: ${{ matrix.arch }}

      - name: Build omnimux
        working-directory: nurpkgs/by-name/om/omnimux/src
        run: cargo build --release

      - name: Download symbol fonts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/fonts
          curl -fsSL -o /tmp/NerdFontsSymbolsOnly.zip \
            "https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/NerdFontsSymbolsOnly.zip"
          unzip -j /tmp/NerdFontsSymbolsOnly.zip "*.ttf" -d dist/fonts
          curl -fsSL -o dist/fonts/NotoColorEmoji.ttf \
            "https://github.com/googlefonts/noto-emoji/raw/v2.051/fonts/NotoColorEmoji.ttf"

      - name: Package for Windows
        shell: pwsh
        run: |
          $zip = "omnimux-windows-${{ matrix.arch }}.zip"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item nurpkgs/by-name/om/omnimux/src/target/release/omnimux.exe dist/
          Compress-Archive -Path dist/* -DestinationPath $zip -Force

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: omnimux-windows-${{ matrix.arch }}.zip
          if-no-files-found: error

  release:
    needs: [build-linux-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update Rolling Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rolling
          name: Rolling Release
          prerelease: true
          make_latest: true
          files: artifacts/*
